name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run English dashboard updater (with retry)
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            python update_dashboard.py && { echo "Success on attempt $i"; break; }
            if [ $i -eq 5 ]; then
              echo "All attempts failed"
              exit 1
            fi
            echo "Failed, waiting 60s..."
            sleep 60
          done

      - name: Run Spanish dashboard updater (with retry)
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            python update_dashboard_es.py && { echo "Success on attempt $i"; break; }
            if [ $i -eq 5 ]; then
              echo "All attempts failed"
              exit 1
            fi
            echo "Failed, waiting 60s..."
            sleep 60
          done

      - name: Commit and push updated dashboards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add salina_historical.html salina_historico.html
          git diff --staged --quiet || git commit -m "chore: auto-update dashboards $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
