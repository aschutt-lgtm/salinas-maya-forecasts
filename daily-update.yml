name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run English dashboard updater
        run: python update_dashboard.py

      - name: Run Spanish dashboard updater
        run: python update_dashboard_es.py

      - name: Commit and push updated dashboards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add salina_historical.html salina_historico.html
          git diff --staged --quiet || git commit -m "chore: auto-update dashboards $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
